<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cozinha - Painel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a1a;
      color: #fff;
      font-family: monospace;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 20px;
      color: #f5a623;
    }

    #status {
      text-align: center;
      margin-bottom: 20px;
      color: #aaa;
      font-size: 0.9rem;
    }

    #pedidos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .pedido {
      background: #2a2a2a;
      border: 2px solid #f5a623;
      border-radius: 10px;
      padding: 20px;
    }

    .pedido.em-preparo {
      border-color: #f5a623;
    }

    .pedido.pendente {
      border-color: #e74c3c;
      animation: pisca 1s infinite;
    }

    @keyframes pisca {
      0%, 100% { border-color: #e74c3c; }
      50% { border-color: #ff8c8c; }
    }

    .pedido h2 {
      font-size: 1.5rem;
      margin-bottom: 10px;
      color: #f5a623;
    }

    .pedido .info {
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 10px;
    }

    .pedido ul {
      list-style: none;
      margin-bottom: 15px;
    }

    .pedido ul li {
      padding: 5px 0;
      border-bottom: 1px solid #333;
      font-size: 0.95rem;
    }

    .pedido .total {
      font-size: 1.2rem;
      font-weight: bold;
      color: #2ecc71;
      margin-bottom: 15px;
    }

    .pedido .status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: bold;
      text-transform: uppercase;
      margin-bottom: 15px;
    }

    .status-pendente { background: #e74c3c; }
    .status-em-preparo { background: #f5a623; color: #000; }
    .status-pronto { background: #2ecc71; color: #000; }
    .status-entregue { background: #555; }

    .btns { display: flex; gap: 10px; flex-wrap: wrap; }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.85rem;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.8; }

    .btn-preparo { background: #f5a623; color: #000; }
    .btn-pronto { background: #2ecc71; color: #000; }
    .btn-entregue { background: #555; color: #fff; }

    #vazio {
      text-align: center;
      color: #555;
      font-size: 1.5rem;
      margin-top: 80px;
    }
  </style>
</head>
<body>

  <h1>í˝” Painel da Cozinha</h1>
  <div id="status">Atualizando...</div>
  <div id="pedidos"></div>
  <div id="vazio" style="display:none">Nenhum pedido no momento</div>

  <script>
    const API = "http://127.0.0.1:8000";
    const RESTAURANT_ID = 1;

    async function atualizarStatus(orderId, status) {
      await fetch(`${API}/orders/${orderId}/status?status=${status}`, { method: "PATCH" });
      carregar();
    }

    function renderPedido(p) {
      const itens = p.items.map(i =>
        `<li>${i.quantity}x Produto #${i.product_id} â€” R$ ${(i.unit_price * i.quantity).toFixed(2)}</li>`
      ).join("");

      const statusClass = p.status.replace(" ", "-");
      const hora = new Date(p.created_at).toLocaleTimeString("pt-BR");

      let btns = "";
      if (p.status === "pendente")
        btns += `<button class="btn-preparo" onclick="atualizarStatus(${p.id}, 'em preparo')">Em Preparo</button>`;
      if (p.status === "em preparo")
        btns += `<button class="btn-pronto" onclick="atualizarStatus(${p.id}, 'pronto')">Pronto</button>`;
      if (p.status === "pronto")
        btns += `<button class="btn-entregue" onclick="atualizarStatus(${p.id}, 'entregue')">Entregue</button>`;

      return `
        <div class="pedido ${statusClass}">
          <h2>Pedido #${p.id}</h2>
          <div class="info">Usuario #${p.user_id} â€” ${hora}</div>
          <span class="status status-${statusClass}">${p.status}</span>
          <ul>${itens}</ul>
          <div class="total">Total: R$ ${p.total.toFixed(2)}</div>
          <div class="btns">${btns}</div>
        </div>
      `;
    }

    async function carregar() {
      try {
        const res = await fetch(`${API}/orders/restaurant/${RESTAURANT_ID}`);
        const pedidos = await res.json();

        const ativos = pedidos.filter(p => p.status !== "entregue");
        const container = document.getElementById("pedidos");
        const vazio = document.getElementById("vazio");

        if (ativos.length === 0) {
          container.innerHTML = "";
          vazio.style.display = "block";
        } else {
          vazio.style.display = "none";
          container.innerHTML = ativos.map(renderPedido).join("");
        }

        document.getElementById("status").textContent =
          "Ultima atualizacao: " + new Date().toLocaleTimeString("pt-BR");
      } catch (e) {
        document.getElementById("status").textContent = "Erro ao conectar na API";
      }
    }

    carregar();
    setInterval(carregar, 5000);
  </script>

</body>
</html>
